{% extends "base.html" %}
{% block content %}

<div class="container mt-4">
    <h2>✏️ Editar Usuario</h2>

    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Usuario</label>
            <input type="text" class="form-control" name="username" value="{{ usuario['username'] }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Nombre Completo</label>
            <input type="text" class="form-control" name="nombre" value="{{ usuario['nombre'] }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Nueva Contraseña</label>
            <input type="password" class="form-control" name="password" placeholder="Dejar en blanco para mantener la contraseña actual">
        </div>

        <button type="submit" class="btn btn-success btn-lg">Guardar Cambios</button>
        <a href="{{ url_for('usuarios') }}" class="btn btn-secondary btn-lg">Cancelar</a>
    </form>
</div>

{% endblock %}
