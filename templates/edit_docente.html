{% extends "base.html" %}
{% block content %}

<div class="container mt-4">
    <h2>✏️ Editar Docente</h2>
    
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Número de Documento</label>
            <input type="text" class="form-control" name="documento" value="{{ docente['documento'] }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Nombre Completo</label>
            <input type="text" class="form-control" name="nombre" value="{{ docente['nombre'] }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Correo Electrónico</label>
            <input type="email" class="form-control" name="correo" value="{{ docente['correo'] }}">
        </div>

        <button type="submit" class="btn btn-success btn-lg">Guardar Cambios</button>
        <a href="{{ url_for('docentes') }}" class="btn btn-secondary btn-lg">Cancelar</a>
    </form>
</div>

{% endblock %}
