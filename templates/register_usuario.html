{% extends "base.html" %}
{% block content %}

<div class="container mt-4">
    <h2>🔐 Registrar Nuevo Usuario</h2>

    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Usuario</label>
            <input type="text" class="form-control" name="username" placeholder="Nombre de usuario para iniciar sesión" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Nombre Completo</label>
            <input type="text" class="form-control" name="nombre" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input type="password" class="form-control" name="password" required>
        </div>

        <button type="submit" class="btn btn-success btn-lg">Guardar Usuario</button>
        <a href="{{ url_for('usuarios') }}" class="btn btn-secondary btn-lg">Cancelar</a>
    </form>
</div>

{% endblock %}
